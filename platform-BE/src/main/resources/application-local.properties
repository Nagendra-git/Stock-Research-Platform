spring.application.name=platform
# Expose the health endpoint over HTTP
management.endpoints.web.exposure.include=health
# Show full component details
management.health.defaults.enabled=true
management.endpoint.health.show-details=always
# FIX: Map the "db" URL group path to target the "mongo" indicator
management.endpoint.health.group.db.include=mongo
# MongoDB
mongodb.connection.uri=mongodb://localhost:27017/
mongodb.database=stock-local
